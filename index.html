<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Pixel Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-block-preview">
      <div class="block-swatch" id="blockSwatch"></div>
      <span class="block-label" id="blockLabel">Dirt</span>
    </div>
    <div class="hud-mode-badge mode-place" id="modeBadge">Place mode</div>
    <div class="hud-keys">
      <span class="key">1</span> cycle block &nbsp;
      <span class="key">P</span> spawn player<br>
      <span class="key">LMB</span> place &nbsp;
      <span class="key">RMB</span> erase
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
